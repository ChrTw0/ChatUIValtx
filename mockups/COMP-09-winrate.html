<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>COMP-09 — A7 Win Rate</title>
<style>
  :root {
    --hud-primary:  #63B3ED;
    --hud-success:  #68D391;
    --hud-warning:  #F6AD55;
    --hud-critical: #FC8181;
    --hud-bg:       rgba(10, 15, 30, 0.95);
    --hud-border:   rgba(99, 179, 237, 0.25);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0a0f1e; display: flex; align-items: center; justify-content: center;
    min-height: 100vh; font-family: system-ui, sans-serif; color: #e2e8f0; padding: 40px;
  }
  .panel {
    width: 380px; padding: 20px;
    background: var(--hud-bg); border: 1px solid var(--hud-border);
    clip-path: polygon(14px 0%, 100% 0%, 100% calc(100% - 14px), calc(100% - 14px) 100%, 0% 100%, 0% 14px);
    position: relative; overflow: hidden;
    animation: hud-reveal 0.6s ease forwards;
  }
  @keyframes hud-reveal { 0%{opacity:0.3} 100%{opacity:1} }
  .scan-line {
    position: absolute; left:0; right:0; height:1px; top:0;
    background: linear-gradient(90deg, transparent, var(--hud-primary), transparent);
    box-shadow: 0 0 8px var(--hud-primary); animation: scan 0.8s ease-out forwards;
  }
  @keyframes scan { from{top:0;opacity:1} to{top:100%;opacity:0} }
  .header {
    display: flex; align-items: center; gap: 8px; margin-bottom: 18px;
    font-size: 10px; letter-spacing: 2px; text-transform: uppercase;
    color: var(--hud-primary); font-family: 'Courier New', monospace;
  }
  .header-dot { width:6px; height:6px; border-radius:50%; background:var(--hud-primary); animation:blink 1.5s infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

  .gauges-grid {
    display: flex; flex-wrap: wrap; gap: 12px; justify-content: center;
  }

  .gauge-wrapper {
    display: flex; flex-direction: column; align-items: center; gap: 4px;
    opacity: 0; animation: fade-up 0.4s cubic-bezier(0.16,1,0.3,1) forwards;
  }
  @keyframes fade-up { 0%{opacity:0;transform:translateY(10px)} 100%{opacity:1;transform:translateY(0)} }

  .gauge-svg { overflow: visible; }
  .gauge-bg { fill: none; stroke: rgba(255,255,255,0.05); }
  .gauge-arc { fill: none; stroke-linecap: round; }
  .gauge-val {
    font-family: 'Courier New', monospace; font-weight: bold;
    fill: #e2e8f0; text-anchor: middle; dominant-baseline: middle;
  }
  .gauge-label {
    font-size: 9px; font-family: 'Courier New', monospace;
    color: rgba(226,232,240,0.4); text-align: center;
    max-width: 80px; letter-spacing: 1px;
    text-transform: uppercase;
  }

  .section-label {
    font-size: 9px; letter-spacing: 2px; text-transform: uppercase;
    color: rgba(226,232,240,0.3); margin-bottom: 14px;
    font-family: 'Courier New', monospace;
  }
</style>
</head>
<body>
<div class="panel">
  <div class="scan-line"></div>
  <div class="header">
    <div class="header-dot"></div>
    A7 · WIN RATE · EJECUTIVOS
  </div>
  <div class="section-label">Tasa de cierre por ejecutivo</div>
  <div class="gauges-grid" id="gauges"></div>
</div>

<script>
const DATA = [
  { nombre: "EJ-01 · CARLOS",   win_rate: 0.72, ganadas: 18, total: 25 },
  { nombre: "EJ-02 · MARÍA",    win_rate: 0.58, ganadas: 14, total: 24 },
  { nombre: "EJ-03 · PEDRO",    win_rate: 0.41, ganadas: 9,  total: 22 },
  { nombre: "EJ-04 · ANA",      win_rate: 0.85, ganadas: 17, total: 20 },
  { nombre: "EJ-05 · LUIS",     win_rate: 0.29, ganadas: 5,  total: 17 },
  { nombre: "EJ-06 · SOFÍA",    win_rate: 0.63, ganadas: 12, total: 19 },
];

// Sort descending
DATA.sort((a,b) => b.win_rate - a.win_rate);

function winRateColor(rate) {
  // interpolate from --hud-critical (red) through --hud-warning (amber) to --hud-success (green)
  if (rate < 0.4) {
    const t = rate / 0.4;
    const r = Math.round(252 + (246-252)*t);
    const g = Math.round(129 + (173-129)*t);
    const b = Math.round(129 + (85-129)*t);
    return `rgb(${r},${g},${b})`;
  } else {
    const t = (rate - 0.4) / 0.6;
    const r = Math.round(246 + (104-246)*t);
    const g = Math.round(173 + (211-173)*t);
    const b = Math.round(85  + (145-85)*t);
    return `rgb(${r},${g},${b})`;
  }
}

const container = document.getElementById('gauges');
const SIZE_MIN = 70, SIZE_MAX = 90;
const maxRate = DATA[0].win_rate;

DATA.forEach((d, i) => {
  const size = SIZE_MIN + (d.win_rate / maxRate) * (SIZE_MAX - SIZE_MIN);
  const r = (size / 2) * 0.7;
  const cx = size / 2, cy = size / 2;
  const stroke = size > 80 ? 7 : 5;
  const circ = 2 * Math.PI * r;
  const color = winRateColor(d.win_rate);
  const glowBlur = 4 + d.win_rate * 12;

  const wrapper = document.createElement('div');
  wrapper.className = 'gauge-wrapper';
  wrapper.style.animationDelay = (0.3 + i * 0.12) + 's';

  const ns = 'http://www.w3.org/2000/svg';
  const svg = document.createElementNS(ns, 'svg');
  svg.setAttribute('width', size); svg.setAttribute('height', size);
  svg.setAttribute('viewBox', `0 0 ${size} ${size}`);
  svg.classList.add('gauge-svg');

  const bg = document.createElementNS(ns, 'circle');
  bg.setAttribute('cx', cx); bg.setAttribute('cy', cy); bg.setAttribute('r', r);
  bg.setAttribute('class', 'gauge-bg'); bg.setAttribute('stroke-width', stroke);
  svg.appendChild(bg);

  const arc = document.createElementNS(ns, 'circle');
  arc.setAttribute('cx', cx); arc.setAttribute('cy', cy); arc.setAttribute('r', r);
  arc.setAttribute('class', 'gauge-arc');
  arc.setAttribute('stroke', color);
  arc.setAttribute('stroke-width', stroke);
  arc.setAttribute('stroke-dasharray', circ);
  arc.setAttribute('stroke-dashoffset', circ);
  arc.style.transform = 'rotate(-90deg)';
  arc.style.transformOrigin = `${cx}px ${cy}px`;
  arc.style.filter = `drop-shadow(0 0 ${glowBlur}px ${color})`;
  svg.appendChild(arc);

  const label = document.createElementNS(ns, 'text');
  label.setAttribute('x', cx); label.setAttribute('y', cy);
  label.setAttribute('class', 'gauge-val');
  label.setAttribute('font-size', size > 80 ? '14' : '11');
  label.setAttribute('fill', color);
  label.textContent = '0%';
  svg.appendChild(label);

  const nameEl = document.createElement('div');
  nameEl.className = 'gauge-label';
  nameEl.textContent = d.nombre;

  wrapper.appendChild(svg);
  wrapper.appendChild(nameEl);
  container.appendChild(wrapper);

  // Animate arc
  const targetOffset = circ * (1 - d.win_rate);
  let current = 0;
  const delay = (0.3 + i * 0.12) * 1000 + 100;
  setTimeout(() => {
    arc.style.transition = `stroke-dashoffset 1.2s cubic-bezier(0.16,1,0.3,1)`;
    arc.style.strokeDashoffset = targetOffset;
    const pct = Math.round(d.win_rate * 100);
    let c = 0;
    const step = () => {
      c = Math.min(c + 2, pct);
      label.textContent = c + '%';
      if (c < pct) requestAnimationFrame(step);
    };
    requestAnimationFrame(step);
  }, delay);
});
</script>
</body>
</html>
