<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Chat Valtx — Mockup completo</title>
<style>
/* ── Tokens ─────────────────────────────────────────── */
:root {
  --brand-1: #ff6200;
  --brand-2: #ffb300;
  --brand-3: #ffe0cc;
  --brand-4: #ffefe5;
  --white:   #fff;
  --gray-1:  #1a1a1a;
  --gray-2:  #333;
  --gray-3:  #555;
  --gray-4:  #888;
  --gray-5:  #bbb;
  --gray-6:  #ddd;
  --gray-7:  #eee;
  --gray-8:  #f7f7f7;
  --color-fill-1: var(--white);
  --color-fill-2: var(--gray-8);
  --color-line-2: var(--gray-6);
  --radius-sm: 6px;
  --radius-md: 10px;
  --shadow-1: 0 3px 4px rgba(0,0,0,.04);
  --shadow-2: 0 4px 8px rgba(0,0,0,.08);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--gray-8);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  font-size: 14px; color: var(--gray-1);
  display: flex; align-items: flex-start; justify-content: center;
  min-height: 100vh; padding: 24px;
}

/* ── Layout ─────────────────────────────────────────── */
.app-wrap {
  display: flex; gap: 0;
  width: 100%; max-width: 1160px;
  height: calc(100vh - 48px);
  border-radius: 16px;
  box-shadow: 0 8px 32px rgba(0,0,0,.10);
  overflow: hidden;
}
.app-chat {
  flex: 1; min-width: 0;
  display: flex; flex-direction: column;
  background: var(--white);
}
.app-panel {
  width: 380px; flex-shrink: 0;
  background: var(--gray-8);
  border-left: 1px solid var(--color-line-2);
  display: flex; flex-direction: column;
  animation: slideIn .2s ease both;
}
@keyframes slideIn { from { opacity:0; transform:translateX(16px); } }

/* ── Navbar ─────────────────────────────────────────── */
.navbar {
  height: 52px; padding: 0 16px;
  display: flex; align-items: center; justify-content: space-between;
  border-bottom: 1px solid var(--color-line-2);
  flex-shrink: 0;
}
.navbar-left { display: flex; align-items: center; gap: 10px; }
.navbar-logo {
  width: 28px; height: 28px; border-radius: 8px;
  background: var(--brand-1);
  display: flex; align-items: center; justify-content: center;
  color: #fff; font-size: 13px; font-weight: 700;
}
.navbar-title { font-size: 13px; font-weight: 600; }
.navbar-sub { font-size: 11px; color: var(--gray-4); margin-top: 1px; }
.navbar-btn {
  width: 28px; height: 28px; border-radius: 50%; border: none; background: none;
  color: var(--gray-4); cursor: pointer; font-size: 16px;
  display: flex; align-items: center; justify-content: center;
}
.navbar-btn:hover { background: var(--gray-7); }

/* ── Messages ───────────────────────────────────────── */
.msg-list {
  flex: 1; overflow-y: auto;
  padding: 20px 16px; display: flex; flex-direction: column; gap: 6px;
}
.msg-list::-webkit-scrollbar { width: 3px; }
.msg-list::-webkit-scrollbar-thumb { background: var(--gray-6); border-radius: 2px; }

/* Mensaje */
.msg {
  display: flex; flex-direction: column;
  opacity: 0; transform: translateY(10px);
  animation: fadeInUp .25s cubic-bezier(.25,.46,.45,.94) both;
}
@keyframes fadeInUp { to { opacity:1; transform:translateY(0); } }
.msg--right { align-items: flex-end; }
.msg--left  { align-items: flex-start; }

/* Badge agente */
.agent-badge {
  display: flex; align-items: center; gap: 5px;
  margin-bottom: 4px;
}
.agent-dot {
  width: 18px; height: 18px; border-radius: 50%;
  background: var(--gray-7);
  display: flex; align-items: center; justify-content: center;
  font-size: 9px;
}
.agent-name { font-size: 10px; color: var(--gray-4); font-weight: 500; }

/* Bubble */
.bubble {
  max-width: 480px; padding: 10px 13px;
  border-radius: var(--radius-md);
  font-size: 13px; line-height: 1.55;
}
.bubble--agent {
  background: var(--white);
  box-shadow: var(--shadow-1);
  border: 1px solid var(--gray-7);
}
.bubble--user {
  background: var(--brand-3);
  border-radius: var(--radius-md) var(--radius-md) 2px var(--radius-md);
}
.bubble--typing {
  background: var(--white);
  box-shadow: var(--shadow-1);
  border: 1px solid var(--gray-7);
  padding: 12px 16px;
  display: flex; gap: 5px; align-items: center;
}
.bubble--typing span {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--gray-5);
  animation: typingDot 1.2s infinite ease-in-out;
}
.bubble--typing span:nth-child(2) { animation-delay: .2s; }
.bubble--typing span:nth-child(3) { animation-delay: .4s; }
@keyframes typingDot {
  0%,80%,100% { transform: scale(.8); opacity:.5; }
  40%         { transform: scale(1.1); opacity:1; }
}

/* Micro-eventos (COMP-14) */
.sys-event {
  display: flex; align-items: center; gap: 8px;
  padding: 4px 0; margin: 2px 0;
  font-size: 11px; color: var(--gray-4);
}
.sys-line { flex: 1; height: 1px; background: var(--gray-7); }
.sys-event--avance .sys-line  { background: #bbf7d0; }
.sys-event--avance .sys-text  { color: #16a34a; }
.sys-event--cambio .sys-line  { background: var(--gray-7); }
.sys-event--alerta .sys-line  { background: #fde68a; }
.sys-event--alerta .sys-text  { color: #d97706; }
.sys-text { white-space: nowrap; font-weight: 500; }

/* ── Evento agente_llamado — línea de trazabilidad (mismo estilo sys-event) */
.trace-event {
  display: flex; align-items: center; gap: 8px;
  padding: 3px 0; margin: 1px 0;
  font-size: 10px; color: var(--gray-5);
  opacity: 0; animation: fadeInUp .2s ease both;
}
.trace-event .sys-line { background: var(--gray-7); }
.trace-event.done .sys-line { background: #bbf7d0; }
.trace-event.done { color: var(--gray-4); }
.trace-text {
  white-space: nowrap; font-weight: 500;
  display: flex; align-items: center; gap: 4px;
}
.trace-spinner {
  width: 8px; height: 8px; border-radius: 50%;
  border: 1.5px solid var(--gray-5);
  border-top-color: transparent;
  animation: spin .7s linear infinite; flex-shrink: 0;
}
@keyframes spin { to { transform: rotate(360deg); } }
.trace-event.done .trace-spinner {
  border: none; background: #22c55e;
  animation: none;
}
.trace-label { font-family: 'SF Mono', Consolas, monospace; }

/* Badge agente en burbuja — clickeable para mostrar qué agente respondió */
.agent-badge { cursor: default; }
.agent-badge--tag {
  display: inline-flex; align-items: center; gap: 4px;
  background: var(--gray-7); border-radius: 4px;
  padding: 2px 7px; font-size: 10px; font-weight: 600;
  color: var(--gray-4); margin-bottom: 5px;
  border: 1px solid var(--gray-6);
}
.agent-badge--tag .dot { width: 5px; height: 5px; border-radius: 50%; background: #22c55e; }

/* HITL cápsulas inline (COMP-13) */
.hitl-capsules {
  display: flex; flex-wrap: wrap; gap: 6px;
  margin-top: 10px;
}
.qr-capsule {
  padding: 6px 14px;
  border: 1.5px solid var(--gray-6);
  border-radius: 20px;
  font-size: 12px; font-weight: 500; color: var(--gray-3);
  background: var(--white);
  cursor: pointer;
  transition: border-color .15s, background .15s, color .15s;
  opacity: 0; transform: translateY(4px);
  animation: fadeInUp .2s cubic-bezier(.25,.46,.45,.94) both;
}
.qr-capsule:hover { border-color: var(--brand-1); color: var(--brand-1); }
.qr-capsule.selected {
  border-color: var(--brand-1); background: var(--brand-4); color: var(--brand-1);
}
.qr-capsule.dismissed { opacity: .3; pointer-events: none; }

/* ── UX-02 Skeleton shimmer ─────────────────────── */
.bubble--skeleton {
  min-width: 200px; max-width: 320px;
  padding: 11px 14px; border-radius: var(--radius-md);
  background: var(--white);
  border: 1px solid var(--gray-7);
  box-shadow: var(--shadow-1);
  display: flex; flex-direction: column; gap: 8px;
  overflow: hidden; position: relative;
}
.bubble--skeleton::after {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(90deg,
    transparent 0%, rgba(255,255,255,.7) 50%, transparent 100%);
  background-size: 200% 100%;
  animation: shimmer 1.4s infinite ease-in-out;
}
@keyframes shimmer {
  0%   { background-position: -200% 0; }
  100% { background-position: 200% 0; }
}
.skel-line {
  height: 9px; border-radius: 4px; background: var(--gray-7);
}
.skel-line--short { width: 55%; }
.skel-line--mid   { width: 78%; }
.skel-line--long  { width: 92%; }

/* ── UX-03 Agent pill ───────────────────────────── */
.bubble--pill {
  display: inline-flex; align-items: center; gap: 8px;
  background: var(--white);
  border: 1px solid var(--gray-6);
  border-radius: 20px;
  padding: 7px 14px 7px 10px;
  box-shadow: var(--shadow-1);
}
.pill-spinner {
  width: 14px; height: 14px; flex-shrink: 0;
  border-radius: 50%;
  border: 2px solid var(--gray-6);
  border-top-color: var(--brand-1);
  animation: spin .7s linear infinite;
}
.pill-label {
  font-size: 12px; font-weight: 500; color: var(--gray-3);
  white-space: nowrap;
}

/* State-swap fade */
.thinking-state {
  transition: opacity .13s ease;
}
.thinking-state.fading { opacity: 0; }

/* Composer */
.composer {
  padding: 12px 16px 14px;
  border-top: 1px solid var(--color-line-2);
  display: flex; align-items: flex-end; gap: 8px;
  flex-shrink: 0;
}
.composer-input {
  flex: 1; resize: none; border: 1.5px solid var(--color-line-2);
  border-radius: var(--radius-md); padding: 9px 12px;
  font-size: 13px; font-family: inherit; color: var(--gray-1);
  max-height: 132px; outline: none; background: var(--white);
  transition: border-color .15s;
}
.composer-input:focus { border-color: var(--brand-1); }
.composer-input::placeholder { color: var(--gray-5); }
.composer-btn {
  width: 36px; height: 36px; border-radius: 50%; border: none;
  background: var(--brand-1); color: #fff;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; flex-shrink: 0; font-size: 14px;
  transition: opacity .15s;
}
.composer-btn:hover { opacity: .88; }
.composer-attach {
  width: 36px; height: 36px; border-radius: 50%; border: none;
  background: none; color: var(--gray-4);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; font-size: 16px;
}
.composer-attach:hover { background: var(--gray-7); }

/* ── Panel derecho ──────────────────────────────────── */
.panel-tabs {
  display: flex; border-bottom: 1px solid var(--color-line-2);
  background: var(--white); flex-shrink: 0;
}
.panel-tab {
  flex: 1; padding: 11px 8px; text-align: center;
  font-size: 11px; font-weight: 600; color: var(--gray-4);
  cursor: pointer; border: none; background: none;
  border-bottom: 2px solid transparent;
  transition: color .15s, border-color .15s;
}
.panel-tab.active { color: var(--brand-1); border-bottom-color: var(--brand-1); }
.panel-body { flex: 1; overflow-y: auto; padding: 14px; }
.panel-body::-webkit-scrollbar { width: 3px; }
.panel-body::-webkit-scrollbar-thumb { background: var(--gray-6); border-radius: 2px; }

/* Panel header */
.panel-section-title {
  font-size: 10px; font-weight: 700; text-transform: uppercase;
  letter-spacing: .7px; color: var(--gray-4);
  margin-bottom: 10px;
}

/* ── COMP-08 Timeline ───────────────────────────────── */
.timeline { position: relative; }
.tl-line {
  position: absolute; left: 5px; top: 8px; bottom: 8px;
  width: 1px; background: var(--gray-7);
}
.tl-fill {
  width: 100%; background: var(--gray-5); border-radius: 1px;
  height: 0; transition: height 1s cubic-bezier(.25,.46,.45,.94);
}
.tl-event {
  display: flex; gap: 11px; margin-bottom: 2px;
  opacity: 0; transform: translateY(6px);
  animation: fadeInUp .22s cubic-bezier(.25,.46,.45,.94) both;
}
.tl-dot {
  flex-shrink: 0; margin-top: 12px;
  width: 11px; height: 11px; border-radius: 50%;
  background: var(--white); border: 2px solid var(--gray-5);
  position: relative; z-index: 1;
  transform: scale(0);
  animation: dotPop .2s cubic-bezier(.25,.46,.45,.94) both;
}
@keyframes dotPop { to { transform:scale(1); } }
.tl-dot.dot-documento    { border-color: var(--brand-1); }
.tl-dot.dot-reunion      { border-color: #22c55e; }
.tl-dot.dot-cambio_etapa { border-color: var(--gray-4); background: var(--gray-7); }
.tl-dot.dot-draft        { border-color: #6366f1; }

.tl-card {
  flex: 1; margin-bottom: 8px;
  border: 1px solid var(--gray-7);
  border-radius: var(--radius-sm);
  overflow: hidden; cursor: pointer;
  transition: border-color .15s;
}
.tl-card:hover { border-color: var(--gray-6); }
.tl-card.open  { border-color: var(--gray-6); box-shadow: var(--shadow-1); }
.tl-card-head { padding: 8px 10px; }
.tl-meta { display: flex; align-items: center; gap: 5px; margin-bottom: 4px; flex-wrap: wrap; }
.tl-tipo {
  font-size: 9px; font-weight: 700; text-transform: uppercase;
  letter-spacing: .4px; padding: 1px 5px; border-radius: 3px;
}
.tipo-documento    { background: var(--brand-4); color: var(--brand-1); }
.tipo-reunion      { background: #f0fdf4; color: #16a34a; }
.tipo-cambio_etapa { background: var(--gray-7); color: var(--gray-4); }
.tipo-draft        { background: #eef2ff; color: #4f46e5; }
.tl-actor { font-size: 10px; font-weight: 600; color: var(--gray-4); }
.tl-date  { font-size: 10px; color: var(--gray-5); white-space: nowrap; flex-shrink: 0; margin-left: auto; }
.tl-resumen {
  font-size: 12px; color: var(--gray-3); line-height: 1.5;
  display: -webkit-box; -webkit-line-clamp: 2;
  -webkit-box-orient: vertical; overflow: hidden;
}
.tl-card.open .tl-resumen { display: block; overflow: visible; padding-bottom: 8px; }
.tl-more {
  display: none; margin-top: 4px;
  font-size: 11px; color: var(--brand-1); font-weight: 500;
  cursor: pointer; background: none; border: none; padding: 0;
}
.tl-more:hover { text-decoration: underline; }
.tl-card.needs-expand .tl-more { display: inline-block; }
.tl-card.open .tl-more { display: none; }
.tl-less {
  display: none; margin-top: 4px;
  font-size: 11px; color: var(--gray-4); font-weight: 500;
  cursor: pointer; background: none; border: none; padding: 0;
}
.tl-less:hover { text-decoration: underline; }
.tl-card.open .tl-less { display: inline-block; }

/* Panel oportunidad header */
.panel-opp-header {
  background: var(--white); border: 1px solid var(--gray-7);
  border-radius: var(--radius-sm); padding: 10px 12px;
  margin-bottom: 12px;
}
.panel-opp-titulo { font-size: 13px; font-weight: 600; margin-bottom: 2px; }
.panel-opp-meta { font-size: 11px; color: var(--gray-4); }

/* ── COMP-07 Pipeline ───────────────────────────────── */

/* Funnel interactivo */
.funnel-wrap {
  display: flex; gap: 3px; align-items: flex-end;
  margin-bottom: 14px; padding: 0 2px;
}
.funnel-step {
  flex: 1; display: flex; flex-direction: column; align-items: center;
  cursor: pointer; gap: 4px;
}
.funnel-bar-wrap {
  width: 100%; display: flex; justify-content: center;
}
.funnel-bar {
  width: 80%; border-radius: 4px 4px 0 0;
  background: var(--gray-7);
  transition: background .15s, transform .15s;
  min-height: 6px;
}
.funnel-step:hover .funnel-bar  { background: var(--brand-3); }
.funnel-step.active .funnel-bar { background: var(--brand-1); }
.funnel-step.active .funnel-label { color: var(--brand-1); }
.funnel-label {
  font-size: 8px; font-weight: 600; text-transform: uppercase;
  letter-spacing: .3px; color: var(--gray-5); text-align: center;
  line-height: 1.2;
}
.funnel-count {
  font-size: 11px; font-weight: 700; color: var(--gray-3);
}
.funnel-step.active .funnel-count { color: var(--brand-1); }
.funnel-baseline {
  height: 1px; background: var(--gray-6); margin-bottom: 12px;
}

/* Cards de oportunidad */
.pip-card {
  background: var(--white); border: 1px solid var(--gray-7);
  border-left: 3px solid var(--gray-6);
  border-radius: var(--radius-sm); margin-bottom: 6px;
  overflow: hidden; cursor: pointer;
  transition: box-shadow .15s, border-color .15s;
  opacity: 0; transform: translateY(6px);
  animation: fadeInUp .22s cubic-bezier(.25,.46,.45,.94) both;
}
.pip-card:hover { box-shadow: var(--shadow-2); }
.pip-card.open  { box-shadow: var(--shadow-2); }
.pip-card[data-etapa="RECIBIDA"]          { border-left-color: var(--gray-5); }
.pip-card[data-etapa="CLASIFICADA"]       { border-left-color: #60a5fa; }
.pip-card[data-etapa="EN_PROPUESTA"]      { border-left-color: var(--brand-2); }
.pip-card[data-etapa="PROPUESTA_ENVIADA"] { border-left-color: var(--brand-1); }
.pip-card[data-etapa="EN_NEGOCIACION"]    { border-left-color: #22c55e; }

.pip-card-head {
  padding: 9px 10px;
  display: flex; gap: 8px; align-items: flex-start;
}
.pip-card-main { flex: 1; min-width: 0; }
.pip-cliente { font-size: 12px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.pip-servicio { font-size: 11px; color: var(--gray-4); margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.pip-card-right { display: flex; flex-direction: column; align-items: flex-end; gap: 3px; flex-shrink: 0; }
.pip-monto { font-size: 12px; font-weight: 700; color: var(--brand-1); }
.pip-ejec {
  font-size: 10px; font-weight: 600; color: var(--white);
  background: var(--gray-4); border-radius: 3px; padding: 1px 5px;
}

/* Chips fila 2 */
.pip-chips {
  padding: 0 10px 8px;
  display: flex; gap: 4px; flex-wrap: wrap; align-items: center;
}
.pip-chip {
  font-size: 9px; font-weight: 600; padding: 2px 6px;
  border-radius: 3px; text-transform: uppercase; letter-spacing: .3px;
}
.chip-etapa    { background: var(--gray-7); color: var(--gray-4); }
.chip-dias-ok  { background: #f0fdf4; color: #16a34a; }
.chip-dias-mid { background: #fefce8; color: #ca8a04; }
.chip-dias-bad { background: #fef2f2; color: #dc2626; }
.chip-comp     { background: #eef2ff; color: #4f46e5; }
.chip-hitl     { background: #fef3c7; color: #d97706; }

/* Detalle expandido */
.pip-detail {
  display: none; padding: 0 10px 10px;
  border-top: 1px solid var(--gray-7); margin-top: 2px;
}
.pip-card.open .pip-detail { display: block; }
.pip-detail-row {
  display: flex; justify-content: space-between;
  font-size: 11px; color: var(--gray-3); padding: 4px 0;
  border-bottom: 1px solid var(--gray-7);
}
.pip-detail-row:last-child { border-bottom: none; }
.pip-detail-label { color: var(--gray-5); font-weight: 500; }

/* "Ver más" paginación */
.pip-more {
  border: 1px dashed var(--gray-5); border-radius: var(--radius-sm);
  padding: 8px; text-align: center; cursor: pointer;
  font-size: 11px; color: var(--gray-4); margin-top: 4px;
  transition: border-color .15s, color .15s;
  opacity: 0; animation: fadeInUp .25s .5s both;
}
.pip-more:hover { border-color: var(--brand-1); color: var(--brand-1); }

/* ── COMP-10 Heatmap ────────────────────────────────── */
.heatmap-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(72px, 1fr)); gap: 5px;
}
.heat-block {
  border-radius: var(--radius-sm); padding: 8px 6px; text-align: center;
  cursor: default; position: relative;
  opacity: 0; animation: fadeInUp .2s cubic-bezier(.25,.46,.45,.94) both;
}
.heat-cliente { font-size: 10px; font-weight: 600; color: var(--gray-2); margin-bottom: 2px; line-height: 1.2; }
.heat-dias    { font-size: 16px; font-weight: 700; color: var(--gray-2); }
.heat-label   { font-size: 8px; color: var(--gray-4); margin-top: 1px; }
/* Tooltip */
.heat-block:hover .heat-tooltip { display: block; }
.heat-tooltip {
  display: none; position: absolute; z-index: 10;
  bottom: calc(100% + 6px); left: 50%; transform: translateX(-50%);
  background: var(--white); border: 1px solid var(--gray-6);
  border-radius: var(--radius-sm); box-shadow: var(--shadow-2);
  padding: 7px 10px; width: 160px; text-align: left;
}
.heat-tooltip-title { font-size: 11px; font-weight: 600; margin-bottom: 4px; }
.heat-tooltip-row { font-size: 10px; color: var(--gray-4); margin-bottom: 2px; }
</style>
</head>
<body>

<div class="app-wrap">

  <!-- ── COLUMNA CHAT ── -->
  <div class="app-chat">

    <!-- Navbar -->
    <div class="navbar">
      <div class="navbar-left">
        <div class="navbar-logo">V</div>
        <div>
          <div class="navbar-title">Agente Valtx</div>
          <div class="navbar-sub">en línea</div>
        </div>
      </div>
      <button class="navbar-btn" title="Nueva conversación">✕</button>
    </div>

    <!-- Messages -->
    <div class="msg-list" id="msgList">

</div>

<script>
/* ══════════════════════════════════════════════
   DATA
══════════════════════════════════════════════ */
const TIMELINE = [
  { tipo:'documento', fecha:'2025-06-07', actor:'LL',

const PIPELINE = [
  { cliente:'YURA',      servicio:'Soporte Hardware Servidores',    monto:48000,  moneda:'PEN', etapa:'EN_PROPUESTA',      ejecutivo:'LL', competidor:'IBM',   dias:8,  hitl:false },
  { cliente:'TGESTIONA', servicio:'Site Alterno Respaldo',          monto:120000, moneda:'PEN', etapa:'PROPUESTA_ENVIADA', ejecutivo:'PQ', competidor:'SONDA', dias:23, hitl:true  },
  { cliente:'UNNA',      servicio:'Soporte Hardware Comunicaciones',monto:31500,  moneda:'PEN', etapa:'CLASIFICADA',       ejecutivo:'JB', competidor:null,    dias:3,  hitl:false },
  { cliente:'YICHANG',   servicio:'Diagnóstico Tecnológico',        monto:18000,  moneda:'PEN', etapa:'EN_PROPUESTA',      ejecutivo:'MS', competidor:'NEXUS', dias:41, hitl:false },
  { cliente:'VALTX',     servicio:'InvGate Suscripción',            monto:9500,   moneda:'USD', etapa:'EN_NEGOCIACION',    ejecutivo:'LL', competidor:null,    dias:5,  hitl:false },
  { cliente:'CEMENTOS',  servicio:'Mesa de Ayuda 7x24',             monto:62000,  moneda:'PEN', etapa:'RECIBIDA',          ejecutivo:'PQ', competidor:'TEAM',  dias:15, hitl:false },
  { cliente:'RIMAC',     servicio:'Hosting Portal Web',             monto:14000,  moneda:'PEN', etapa:'EN_PROPUESTA',      ejecutivo:'JB', competidor:null,    dias:2,  hitl:false },
];
const PIPELINE_TOTAL = 10; // simula tiene_mas

const HEATMAP = [
  { cliente:'YURA',      servicio:'HW Servidores', dias:23 },
  { cliente:'TGESTIONA', servicio:'Site Alterno',  dias:41 },
  { cliente:'UNNA',      servicio:'HW Comms',      dias:8  },
  { cliente:'YICHANG',   servicio:'Diagnóstico',   dias:67 },
  { cliente:'VALTX',     servicio:'InvGate',        dias:15 },
  { cliente:'CEMENTOS',  servicio:'Hosting',        dias:52 },
];

/* ══════════════════════════════════════════════
   CHAT SCRIPT
   Simula el flujo SSE real:
     pensando → trace(agente_llamado) → trace.done → respuesta(agente)
     pensando → trace → hitl(opciones inline)
══════════════════════════════════════════════ */

// AGENT_LABELS espeja constants.ts del frontend
const AGENT_LABELS = {
  agent1: 'A1 · Clasificador',
  agent2: 'A2 · Constructor',
  agent3: 'A3 · Costos',
  agent4: 'A4 · Coordinador',
  agent5: 'A5 · Inteligencia',
  agent6: 'A6 · Registro',
  agent7: 'A7 · Análisis',
};

// UX-03 — labels semánticos para el pill animado (de UX_CANDIDATOS.md)
const AGENT_PILL_LABELS = {
  agent1: 'Analizando documento...',
  agent2: 'Generando propuesta...',
  agent3: 'Revisando cotización...',
  agent4: 'Mapeando dependencias...',
  agent5: 'Investigando mercado...',
  agent6: 'Registrando...',
  agent7: 'Buscando oportunidad...',
};

// Cada entrada = secuencia de eventos SSE que llegan para ese turno
const TURNS = [
  // Turno 1: usuario pregunta por YURA
  {
    user: '¿Cómo va la oportunidad de YURA soporte hardware?',
    sse: [
      { tipo: 'pensando' },
      { tipo: 'agente_llamado', agente: 'agent1' },
      { tipo: 'agente_llamado', agente: 'agent7', done_prev: true },
      { tipo: 'respuesta',
        agente: 'agent7',
        mensaje: 'La oportunidad **YURA — Soporte Hardware Servidores** está activa en etapa **PROPUESTA**. Te muestro el timeline y el pipeline en el panel.',
      },
    ],
  },
  // Turno 2: usuario pregunta por estancadas
  {
    user: '¿Hay oportunidades sin movimiento esta semana?',
    sse: [
      { tipo: 'pensando' },
      { tipo: 'agente_llamado', agente: 'agent7' },
      { tipo: 'respuesta',
        agente: 'agent7',
        mensaje: 'Encontré **6 oportunidades** con más de 7 días sin actividad. El heatmap en el panel derecho muestra la temperatura por días.',
      },
    ],
  },
  // Turno 3: HITL — A0 decide pedir confirmación
  {
    user: '¿Me mandas un resumen de las críticas?',
    sse: [
      { tipo: 'pensando' },
      { tipo: 'agente_llamado', agente: 'agent7' },
      { tipo: 'hitl',
        agente: 'agent1',
        mensaje: 'Encontré 3 oportunidades críticas (>30 días sin actividad). ¿Qué quieres hacer?',
        opciones: ['Generar recordatorios', 'Solo ver la lista', 'Ignorar por ahora'],
      },
    ],
  },
];

function formatFecha(iso) {
  const [y,m,d] = iso.split('-');
  const M = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
  return `${parseInt(d)} ${M[parseInt(m)-1]} ${y.slice(2)}`;
}

function lerpColor(t, c1, c2) {
  const h = s => [parseInt(s.slice(1,3),16), parseInt(s.slice(3,5),16), parseInt(s.slice(5,7),16)];
  const [r1,g1,b1]=h(c1), [r2,g2,b2]=h(c2);
  return `rgb(${Math.round(r1+(r2-r1)*t)},${Math.round(g1+(g2-g1)*t)},${Math.round(b1+(b2-b1)*t)})`;
}
function heatColor(dias) {
  if (dias < 14) return lerpColor(dias/14, '#dbeafe', '#fef9c3');
  return lerpColor(Math.min((dias-14)/46,1), '#fef9c3', '#fee2e2');
}

const msgList = document.getElementById('msgList');

function md(text) {
  return text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
}

// Agrega burbuja de usuario
function addUser(text) {
  const div = document.createElement('div');
  div.className = 'msg msg--right';
  div.innerHTML = `<div class="bubble bubble--user">${text}</div>`;
  msgList.appendChild(div);
  scroll();
}

// UX-02 — Skeleton shimmer: aparece inmediatamente tras el envío, antes del primer SSE
function addSkeleton() {
  const div = document.createElement('div');
  div.className = 'msg msg--left';
  div.id = 'thinking-bubble';
  div.innerHTML = `
    <div class="thinking-state">
      <div class="bubble--skeleton">
        <div class="skel-line skel-line--long"></div>
        <div class="skel-line skel-line--mid"></div>
        <div class="skel-line skel-line--short"></div>
      </div>
    </div>`;
  msgList.appendChild(div);
  scroll();
  return div;
}

// Swap interno del thinking con fade
function swapThinkingContent(html) {
  const bubble = document.getElementById('thinking-bubble');
  if (!bubble) return;
  const state = bubble.querySelector('.thinking-state');
  if (!state) return;
  state.classList.add('fading');
  setTimeout(() => {
    state.innerHTML = html;
    state.classList.remove('fading');
  }, 130);
}

// Pensando: skeleton → typing dots
function mutateToTyping() {
  swapThinkingContent(`
    <div class="bubble bubble--typing">
      <span></span><span></span><span></span>
    </div>`);
}

// UX-03 — agente_llamado: typing → pill semántico
function mutateToAgentPill(agente) {
  const label = AGENT_PILL_LABELS[agente] || (AGENT_LABELS[agente] + '...');
  swapThinkingContent(`
    <div class="bubble--pill">
      <div class="pill-spinner"></div>
      <span class="pill-label">${label}</span>
    </div>`);
}

// Agrega evento de trazabilidad agente_llamado — línea completa con spinner
function addTrace(agente) {
  const label = AGENT_LABELS[agente] || agente;
  const div = document.createElement('div');
  div.className = 'trace-event';
  div.dataset.agente = agente;
  div.innerHTML = `
    <div class="sys-line"></div>
    <span class="trace-text">
      <span class="trace-spinner"></span>
      <span class="trace-label">${label}</span>
    </span>
    <div class="sys-line"></div>`;
  msgList.appendChild(div);
  scroll();
  return div;
}

// Marca trace como completado — spinner → dot verde
function doneTrace(agente) {
  const el = msgList.querySelector(`.trace-event[data-agente="${agente}"]:not(.done)`);
  if (el) el.classList.add('done');
}

// Agrega burbuja de respuesta con badge de agente
function addResponse(agente, mensaje) {
  const label = AGENT_LABELS[agente] || agente;
  // Quitar thinking
  document.getElementById('thinking-bubble')?.remove();

  const div = document.createElement('div');
  div.className = 'msg msg--left';
  div.innerHTML = `
    <div class="agent-badge--tag"><span class="dot"></span>${label}</div>
    <div class="bubble bubble--agent">${md(mensaje)}</div>`;
  msgList.appendChild(div);
  scroll();
}

// Agrega burbuja HITL con cápsulas inline — A0 habla, sin badge de agente
function addHitl(agente, mensaje, opciones) {
  doneTrace(agente);
  document.getElementById('thinking-bubble')?.remove();

  const div = document.createElement('div');
  div.className = 'msg msg--left';
  const capsId = 'hitl-' + Date.now();
  div.innerHTML = `
    <div class="bubble bubble--agent">
      <div>${md(mensaje)}</div>
      <div class="hitl-capsules" id="${capsId}"></div>
    </div>`;
  msgList.appendChild(div);
  scroll();

  const container = document.getElementById(capsId);
  opciones.forEach((op, i) => {
    const btn = document.createElement('button');
    btn.className = 'qr-capsule';
    btn.style.animationDelay = (0.15 + i * 0.07) + 's';
    btn.textContent = op;
    btn.onclick = () => {
      container.querySelectorAll('.qr-capsule').forEach(b => {
        b.classList.toggle('selected', b === btn);
        b.classList.toggle('dismissed', b !== btn);
      });
      setTimeout(() => {
        addUser(op);
      }, 300);
    };
    container.appendChild(btn);
  });
}

function scroll() { msgList.scrollTop = msgList.scrollHeight; }

// ── Reproduce los turnos con timing que simula SSE ──
let t = 0;
const GAP = {
  skeleton: 120,   // UX-02: aparece casi inmediato tras envío
  pensando: 380,   // pensando: skeleton → typing dots
  agente_llamado: 620,  // UX-03: typing → pill semántico + traza
  respuesta: 700,
  hitl: 700,
};

TURNS.forEach(turn => {
  // 1. Burbuja usuario
  setTimeout(() => addUser(turn.user), t);
  t += 80;

  // 2. UX-02 — skeleton shimmer (inmediato, antes de cualquier SSE)
  setTimeout(() => addSkeleton(), t);
  t += GAP.skeleton;

  let lastTrace = null;
  let firstAgent = true; // el primer agente_llamado reemplaza el thinking, los demás solo añaden traza

  turn.sse.forEach(ev => {
    if (ev.tipo === 'pensando') {
      // skeleton → typing dots
      setTimeout(() => mutateToTyping(), t);
      t += GAP.pensando;

    } else if (ev.tipo === 'agente_llamado') {
      setTimeout(() => {
        if (ev.done_prev && lastTrace) doneTrace(lastTrace);
        lastTrace = ev.agente;
        // UX-03: primera llamada → muta el pill; siguientes → pill ya está, solo actualiza label
        if (firstAgent) {
          mutateToAgentPill(ev.agente);
          firstAgent = false;
        } else {
          // Agente encadenado: actualiza pill label + añade traza del anterior ya done
          mutateToAgentPill(ev.agente);
        }
        addTrace(ev.agente);
      }, t);
      t += GAP.agente_llamado;

    } else if (ev.tipo === 'respuesta') {
      setTimeout(() => {
        doneTrace(ev.agente);
        addResponse(ev.agente, ev.mensaje);
      }, t);
      t += GAP.respuesta;

    } else if (ev.tipo === 'hitl') {
      setTimeout(() => {
        doneTrace(ev.agente);
        addHitl(ev.agente, ev.mensaje, ev.opciones);
      }, t);
      t += GAP.hitl;
    }
  });

  t += 900; // pausa entre turnos
});

/* ══════════════════════════════════════════════
   PANEL TABS
══════════════════════════════════════════════ */
function switchTab(el, tab) {
  document.querySelectorAll('.panel-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  renderPanel(tab);
}

function renderPanel(tab) {
  const body = document.getElementById('panelBody');
  body.innerHTML = '';

  if (tab === 'timeline') {
    body.innerHTML = `
      <div class="panel-opp-header">
        <div class="panel-opp-titulo">Yura Soporte Hardware Servidores 2025</div>
        <div class="panel-opp-meta">YURA · 8 actividades · última: 21 jul 25</div>
      </div>
      <div class="panel-section-title">Actividades</div>
      <div class="timeline" id="tl">
        <div class="tl-line"><div class="tl-fill" id="tlFill"></div></div>
      </div>`;
    const tl = document.getElementById('tl');
    TIMELINE.forEach((ev, i) => {
      const row = document.createElement('div');
      row.className = 'tl-event';
      row.style.animationDelay = (i * .055) + 's';

      const dot = document.createElement('div');
      dot.className = `tl-dot dot-${ev.tipo}`;
      dot.style.animationDelay = (i * .055) + 's';

      const card = document.createElement('div');
      card.className = 'tl-card';
      card.innerHTML = `
        <div class="tl-card-head">
          <div class="tl-meta">
            <span class="tl-tipo tipo-${ev.tipo}">${ev.tipo.replace('_',' ')}</span>
            <span class="tl-actor">${ev.actor}</span>
            <span class="tl-date">${formatFecha(ev.fecha)}</span>
          </div>
          <div class="tl-resumen">${ev.resumen}</div>
          <button class="tl-more">ver más ↓</button>
          <button class="tl-less">ocultar ↑</button>
        </div>`;

      card.querySelector('.tl-more').addEventListener('click', e => {
        e.stopPropagation(); card.classList.add('open');
      });
      card.querySelector('.tl-less').addEventListener('click', e => {
        e.stopPropagation(); card.classList.remove('open');
      });

      row.appendChild(dot);
      row.appendChild(card);
      tl.appendChild(row);
    });
    requestAnimationFrame(() => {
      document.querySelectorAll('.tl-card').forEach(card => {
        const r = card.querySelector('.tl-resumen');
        if (r.scrollHeight > r.clientHeight + 2) card.classList.add('needs-expand');
      });
      const fill = document.getElementById('tlFill');
      if (fill) fill.style.height = '100%';
    });
  }

  if (tab === 'pipeline') {
    const ETAPAS = ['RECIBIDA','CLASIFICADA','EN_PROPUESTA','PROPUESTA_ENVIADA','EN_NEGOCIACION'];
    const ETAPA_LABEL = {
      RECIBIDA:'Recibida', CLASIFICADA:'Clasificada',
      EN_PROPUESTA:'Propuesta', PROPUESTA_ENVIADA:'Enviada', EN_NEGOCIACION:'Negoc.'
    };
    let filtroEtapa = null;

    function fmtMonto(m, cur) {
      const sym = cur === 'USD' ? 'US$' : 'S/';
      return `${sym} ${m.toLocaleString('es-PE')}`;
    }
    function diasChip(d) {
      if (d <= 7)  return `<span class="pip-chip chip-dias-ok">${d}d</span>`;
      if (d <= 14) return `<span class="pip-chip chip-dias-mid">${d}d</span>`;
      return `<span class="pip-chip chip-dias-bad">${d}d ⚠</span>`;
    }

    function renderPipeline() {
      body.innerHTML = '';

      // ── Funnel ──
      const counts = {};
      ETAPAS.forEach(e => counts[e] = PIPELINE.filter(p => p.etapa === e).length);
      const maxCount = Math.max(...Object.values(counts), 1);

      const funnelWrap = document.createElement('div');
      funnelWrap.innerHTML = '<div class="panel-section-title">Pipeline activo</div>';

      const funnel = document.createElement('div');
      funnel.className = 'funnel-wrap';
      ETAPAS.forEach(etapa => {
        const n   = counts[etapa];
        const pct = Math.max(Math.round((n / maxCount) * 64), 8);
        const step = document.createElement('div');
        step.className = 'funnel-step' + (filtroEtapa === etapa ? ' active' : '');
        step.innerHTML = `
          <div class="funnel-count">${n}</div>
          <div class="funnel-bar-wrap"><div class="funnel-bar" style="height:${pct}px"></div></div>
          <div class="funnel-label">${ETAPA_LABEL[etapa]}</div>`;
        step.addEventListener('click', () => {
          filtroEtapa = filtroEtapa === etapa ? null : etapa;
          renderPipeline();
        });
        funnel.appendChild(step);
      });
      funnelWrap.appendChild(funnel);
      funnelWrap.innerHTML += '<div class="funnel-baseline"></div>';
      body.appendChild(funnelWrap);

      // ── Cards ──
      const visibles = filtroEtapa
        ? PIPELINE.filter(p => p.etapa === filtroEtapa)
        : PIPELINE;

      visibles.forEach((row, i) => {
        const card = document.createElement('div');
        card.className = 'pip-card';
        card.dataset.etapa = row.etapa;
        card.style.animationDelay = (i * .055) + 's';

        const etapaLabel = ETAPA_LABEL[row.etapa] || row.etapa;

        card.innerHTML = `
          <div class="pip-card-head">
            <div class="pip-card-main">
              <div class="pip-cliente">${row.cliente}</div>
              <div class="pip-servicio">${row.servicio}</div>
            </div>
            <div class="pip-card-right">
              <span class="pip-monto">${fmtMonto(row.monto, row.moneda)}</span>
              <span class="pip-ejec">${row.ejecutivo}</span>
            </div>
          </div>
          <div class="pip-chips">
            <span class="pip-chip chip-etapa">${etapaLabel}</span>
            ${diasChip(row.dias)}
            ${row.competidor ? `<span class="pip-chip chip-comp">vs ${row.competidor}</span>` : ''}
            ${row.hitl ? `<span class="pip-chip chip-hitl">⏳ validar</span>` : ''}
          </div>
          <div class="pip-detail">
            <div class="pip-detail-row"><span class="pip-detail-label">Etapa</span><span>${row.etapa.replace(/_/g,' ')}</span></div>
            <div class="pip-detail-row"><span class="pip-detail-label">Ejecutivo</span><span>${row.ejecutivo}</span></div>
            <div class="pip-detail-row"><span class="pip-detail-label">Monto</span><span>${fmtMonto(row.monto, row.moneda)}</span></div>
            ${row.competidor ? `<div class="pip-detail-row"><span class="pip-detail-label">Competidor</span><span>${row.competidor}</span></div>` : ''}
            <div class="pip-detail-row"><span class="pip-detail-label">Última actividad</span><span>hace ${row.dias} días</span></div>
            ${row.hitl ? `<div class="pip-detail-row"><span class="pip-detail-label">Estado</span><span style="color:#d97706">Requiere validación</span></div>` : ''}
          </div>`;

        card.addEventListener('click', () => card.classList.toggle('open'));
        body.appendChild(card);
      });

      // ── Ver más ──
      if (PIPELINE_TOTAL > PIPELINE.length && !filtroEtapa) {
        const more = document.createElement('div');
        more.className = 'pip-more';
        more.textContent = `+ ${PIPELINE_TOTAL - PIPELINE.length} oportunidades más — pedir siguiente página`;
        more.addEventListener('click', () => {
          more.textContent = 'Solicitando más resultados al agente…';
          more.style.opacity = '.5';
        });
        body.appendChild(more);
      }
    }

    renderPipeline();
  }

  if (tab === 'heatmap') {
    body.innerHTML = '<div class="panel-section-title">Estancadas — días sin movimiento</div><div class="heatmap-grid" id="hgrid"></div>';
    const grid = document.getElementById('hgrid');
    HEATMAP.forEach((h, i) => {
      const div = document.createElement('div');
      div.className = 'heat-block';
      div.style.background = heatColor(h.dias);
      div.style.animationDelay = (i * .05) + 's';
      div.innerHTML = `
        <div class="heat-cliente">${h.cliente}</div>
        <div class="heat-dias">${h.dias}</div>
        <div class="heat-label">días</div>
        <div class="heat-tooltip">
          <div class="heat-tooltip-title">${h.cliente}</div>
          <div class="heat-tooltip-row">${h.servicio}</div>
          <div class="heat-tooltip-row">${h.dias} días sin actividad</div>
        </div>`;
      grid.appendChild(div);
    });
  }
}

// Render inicial
renderPanel('timeline');
</script>
