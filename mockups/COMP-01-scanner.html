<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>COMP-01 — A1 Scanner de clasificación</title>
<style>
  :root {
    --hud-primary:  #63B3ED;
    --hud-success:  #68D391;
    --hud-warning:  #F6AD55;
    --hud-critical: #FC8181;
    --hud-bg:       rgba(10, 15, 30, 0.95);
    --hud-border:   rgba(99, 179, 237, 0.25);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0a0f1e;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: system-ui, sans-serif;
    color: #e2e8f0;
  }

  .panel {
    width: 340px;
    padding: 20px;
    background: var(--hud-bg);
    border: 1px solid var(--hud-border);
    clip-path: polygon(14px 0%, 100% 0%, 100% calc(100% - 14px), calc(100% - 14px) 100%, 0% 100%, 0% 14px);
    position: relative;
    overflow: hidden;
    animation: hud-reveal 0.6s cubic-bezier(0.16,1,0.3,1) forwards;
  }

  @keyframes hud-reveal {
    0%   { clip-path: polygon(14px 0%, 100% 0%, 100% 0%, 0% 0%, 0% 14px, 14px 0%); opacity: 0.3; }
    60%  { clip-path: polygon(14px 0%, 100% 0%, 100% 75%, 0% 75%, 0% 14px, 14px 0%); opacity: 0.8; }
    100% { clip-path: polygon(14px 0%, 100% 0%, 100% calc(100% - 14px), calc(100% - 14px) 100%, 0% 100%, 0% 14px); opacity: 1; }
  }

  .scan-line {
    position: absolute;
    left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--hud-primary), transparent);
    box-shadow: 0 0 8px var(--hud-primary);
    animation: scan 0.8s ease-out forwards;
    top: 0;
  }
  @keyframes scan {
    from { top: 0; opacity: 1; }
    to   { top: 100%; opacity: 0; }
  }

  /* Header */
  .header {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 16px;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--hud-primary);
    font-family: 'Courier New', monospace;
  }
  .header-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--hud-primary);
    animation: pulse-dot 1.5s ease-in-out infinite;
  }
  @keyframes pulse-dot {
    0%,100% { opacity: 1; }
    50%      { opacity: 0.3; }
  }

  /* Rings */
  .rings-wrapper {
    display: flex;
    justify-content: center;
    margin: 16px 0;
    position: relative;
    height: 100px;
  }
  .rings {
    position: relative;
    width: 100px;
    height: 100px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .ring {
    position: absolute;
    border-radius: 50%;
    border: 1px solid var(--hud-primary);
    animation: ring-close 0.6s cubic-bezier(0.16,1,0.3,1) forwards;
    opacity: 0;
  }
  .ring:nth-child(1) { width: 96px; height: 96px; animation-delay: 0.1s; }
  .ring:nth-child(2) { width: 72px; height: 72px; animation-delay: 0.25s; border-color: rgba(99,179,237,0.6); }
  .ring:nth-child(3) { width: 48px; height: 48px; animation-delay: 0.4s; border-color: rgba(99,179,237,0.4); }

  @keyframes ring-close {
    0%   { transform: scale(1.6); opacity: 0; }
    100% { transform: scale(1);   opacity: 1; }
  }

  .tipo-label {
    position: relative;
    z-index: 2;
    font-family: 'Courier New', monospace;
    font-size: 22px;
    font-weight: bold;
    color: var(--hud-success);
    text-shadow: 0 0 12px var(--hud-success);
    overflow: hidden;
    white-space: nowrap;
  }
  /* typewriter via JS */

  /* Confianza */
  .confianza-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 14px;
    font-size: 11px;
    color: rgba(226,232,240,0.6);
    font-family: 'Courier New', monospace;
  }
  .confianza-val {
    color: var(--hud-primary);
    font-size: 15px;
    font-weight: bold;
  }
  .confianza-bar {
    flex: 1;
    margin: 0 10px;
    height: 3px;
    background: rgba(99,179,237,0.15);
    border-radius: 2px;
    overflow: hidden;
  }
  .confianza-fill {
    height: 100%;
    background: var(--hud-primary);
    border-radius: 2px;
    width: 0%;
    transition: width 1s cubic-bezier(0.16,1,0.3,1);
    box-shadow: 0 0 6px var(--hud-primary);
  }

  /* Requisitos */
  .section-label {
    font-size: 9px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: rgba(226,232,240,0.4);
    margin-bottom: 8px;
    font-family: 'Courier New', monospace;
  }
  .tags {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 14px;
  }
  .tag {
    padding: 3px 8px;
    font-size: 11px;
    border: 1px solid rgba(99,179,237,0.3);
    color: var(--hud-primary);
    background: rgba(99,179,237,0.08);
    border-radius: 3px;
    opacity: 0;
    transform: translateY(6px);
    animation: tag-in 0.3s cubic-bezier(0.16,1,0.3,1) forwards;
    font-family: 'Courier New', monospace;
  }

  @keyframes tag-in {
    to { opacity: 1; transform: translateY(0); }
  }

  /* Flags */
  .flags { display: flex; gap: 6px; flex-wrap: wrap; }
  .flag {
    padding: 2px 7px;
    font-size: 10px;
    border-radius: 3px;
    font-family: 'Courier New', monospace;
    opacity: 0;
    animation: tag-in 0.3s cubic-bezier(0.16,1,0.3,1) forwards;
  }
  .flag-warning {
    background: rgba(246,173,85,0.15);
    border: 1px solid rgba(246,173,85,0.4);
    color: var(--hud-warning);
    animation: pulse-flag 2s ease-in-out infinite, tag-in 0.3s cubic-bezier(0.16,1,0.3,1) forwards;
  }
  .flag-critical {
    background: rgba(252,129,129,0.15);
    border: 1px solid rgba(252,129,129,0.4);
    color: var(--hud-critical);
    animation: pulse-flag 1.5s ease-in-out infinite, tag-in 0.3s cubic-bezier(0.16,1,0.3,1) forwards;
  }
  @keyframes pulse-flag {
    0%,100% { box-shadow: none; }
    50% { box-shadow: 0 0 8px currentColor; }
  }

  /* Cliente row */
  .cliente-row {
    font-size: 12px;
    color: rgba(226,232,240,0.5);
    margin-bottom: 14px;
    font-family: 'Courier New', monospace;
  }
  .cliente-row span {
    color: #e2e8f0;
  }
</style>
</head>
<body>

<div class="panel" id="panel">
  <div class="scan-line"></div>

  <div class="header">
    <div class="header-dot"></div>
    A1 · CLASIFICADOR · ACTIVO
  </div>

  <div class="rings-wrapper">
    <div class="rings">
      <div class="ring"></div>
      <div class="ring"></div>
      <div class="ring"></div>
      <div class="tipo-label" id="tipo-label"></div>
    </div>
  </div>

  <div class="confianza-row">
    <span>CONFIANZA</span>
    <div class="confianza-bar">
      <div class="confianza-fill" id="conf-fill"></div>
    </div>
    <span class="confianza-val" id="conf-val">0%</span>
  </div>

  <div class="cliente-row">CLIENTE · <span id="cliente-label"></span></div>

  <div class="section-label">Requisitos clave</div>
  <div class="tags" id="tags-container"></div>

  <div class="section-label">Flags</div>
  <div class="flags" id="flags-container"></div>
</div>

<script>
  const DATA = {
    tipo: "A",
    confianza: 0.92,
    cliente: "CLIENTE DEMO S.A.",
    requisitos_clave: ["Staffing senior", "Certificación ISO 27001", "Plazo 60 días", "Integración legacy"],
    flags: [
      { label: "monto_alto", level: "warning" },
      { label: "requiere_staffing", level: "warning" },
      { label: "plazo_critico", level: "critical" },
    ]
  };

  // Typewriter tipo
  const tipoEl = document.getElementById('tipo-label');
  const tipoText = `TIPO ${DATA.tipo}`;
  let i = 0;
  setTimeout(() => {
    const interval = setInterval(() => {
      tipoEl.textContent = tipoText.slice(0, i + 1);
      i++;
      if (i >= tipoText.length) clearInterval(interval);
    }, 70);
  }, 600);

  // Confianza count-up
  const fillEl = document.getElementById('conf-fill');
  const valEl = document.getElementById('conf-val');
  const target = DATA.confianza * 100;
  let current = 0;
  setTimeout(() => {
    fillEl.style.width = target + '%';
    const step = () => {
      current = Math.min(current + 2, target);
      valEl.textContent = Math.round(current) + '%';
      if (current < target) requestAnimationFrame(step);
    };
    requestAnimationFrame(step);
  }, 400);

  // Cliente
  document.getElementById('cliente-label').textContent = DATA.cliente;

  // Tags stagger
  const tagsContainer = document.getElementById('tags-container');
  DATA.requisitos_clave.forEach((req, idx) => {
    const tag = document.createElement('span');
    tag.className = 'tag';
    tag.textContent = req;
    tag.style.animationDelay = (0.8 + idx * 0.08) + 's';
    tagsContainer.appendChild(tag);
  });

  // Flags
  const flagsContainer = document.getElementById('flags-container');
  DATA.flags.forEach((f, idx) => {
    const flag = document.createElement('span');
    flag.className = `flag flag-${f.level}`;
    flag.textContent = f.label;
    flag.style.animationDelay = (1.1 + idx * 0.08) + 's';
    flagsContainer.appendChild(flag);
  });
</script>
</body>
</html>
